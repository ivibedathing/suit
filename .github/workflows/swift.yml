# Builds Suit and runs its logic harnesses.
#
# Suit has no SwiftPM/Xcode project (see CLAUDE.md "Why no SwiftPM"): sources are
# compiled directly with swiftc via ./build.sh, and UI-free logic is verified by
# standalone harnesses via scripts/test.sh. So this workflow drives those, not
# `swift build` / `swift test`.

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: ./build.sh
    - name: List logic harnesses
      run: scripts/test.sh --list
    - name: Run tests
      run: scripts/test.sh
